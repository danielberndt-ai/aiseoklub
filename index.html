<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>AI-láthatósági audit | AI SEO Klub</title>
    <meta
      name="description"
      content="Ingyenes AI-láthatósági audit: nézd meg, mennyire látja a weboldaladat a ChatGPT, a Claude, a Gemini, a Perplexity és a Google AI keresése."
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      /* A háttér-színátmenet a <body>-n van (nem egy belső div-en), és a
         viewport-fit=cover miatt a tartalom a képernyő széléig ér. Így a háttér
         befut a mobil böngésző cím- és eszköztára mögé is – nincs külön
         kifestett blokk. (Ugyanez a megoldás pl. a rackhost.hu-nál is.) */
      /* FONTOS: NINCS background-attachment: fixed!
         Az iOS WebKit (Safari, Comet) a "fixed" hátteret nem terjeszti ki a
         canvas-ra, vagyis a böngésző cím- és eszköztára mögötti területre –
         ott a tömör background-color-t festené, ami látható sötét blokként
         jelenik meg. Görgő (alapértelmezett) háttérrel a böngésző a body
         háttérét a lap szélein túlra is kiterjeszti, így a sávok mögé is
         seamlessen befut. */
      /* ASZTALI GÉP: marad az eredeti színátmenet. */
      body {
        background-color: #010f0e;
        background-image: radial-gradient(
          ellipse 1200px 700px at 50% -10%,
          #0d4f4c 0%,
          #08403d 28%,
          #042f2e 55%,
          #021d1c 80%,
          #010f0e 100%
        );
        background-repeat: no-repeat;
      }

      /* MOBIL: lapos, egyszínű háttér.
         Indok (teszttel igazolva): a mobil böngésző a cím- és eszköztára mögötti
         sávot a body BACKGROUND-COLOR-jával festi ki. Ha a tartalom ettől eltérő
         színű (színátmenet vagy fényfolt), a sáv látható blokként elválik.
         Egyetlen, egyenletes szín esetén a sáv és a tartalom azonos -> eltűnik.
         Ezért itt a színátmenetet ÉS a lebegő fényfoltokat is kikapcsoljuk. */
      @media (max-width: 768px) {
        body {
          background-color: #042f2e;
          background-image: none;
        }
        .glow-bg {
          display: none !important;
        }
      }

      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
